<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editează Task</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/tasks">Task-uri</a>
</nav>

<div class="container mt-4">

    <h2>Editează task</h2>

    <form th:action="@{'/tasks/edit/' + ${task.id}}" th:object="${task}" method="post">

        <div class="mb-3">
            <label class="form-label">Titlu</label>
            <input type="text" th:field="*{title}" class="form-control">
            <div class="text-danger" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descriere</label>
            <textarea th:field="*{description}" class="form-control"></textarea>
            <div class="text-danger" th:errors="*{description}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Data limită</label>
            <input type="date" th:field="*{dueDate}" class="form-control">
            <div class="text-danger" th:errors="*{dueDate}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Finalizat</label>
            <input type="checkbox" th:field="*{completed}">
        </div>

        <button class="btn btn-primary">Salvează</button>
    </form>

</div>

</body>
</html>
