<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task-uri</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/tasks">Task-uri</a>

    <div>
        <a href="/tasks/stats" class="btn btn-info me-2">Statistici</a>
        <a href="/tasks/pdf" class="btn btn-secondary">Descarcă PDF</a>
    </div>
</nav>

<div class="container mt-4">

    <a href="/tasks/add" class="btn btn-success mb-3">Adaugă task</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Titlu</th>
            <th>Descriere</th>
            <th>Data</th>
            <th>Finalizat</th>
            <th>Acțiuni</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.title}"></td>
            <td th:text="${task.description}"></td>
            <td th:text="${task.dueDate}"></td>
            <td th:text="${task.completed ? 'Da' : 'Nu'}"></td>

            <td>
                <a th:href="@{'/tasks/edit/' + ${task.id}}" class="btn btn-primary btn-sm">Editează</a>
                <a th:href="@{'/tasks/delete/' + ${task.id}}" class="btn btn-danger btn-sm ms-2">Șterge</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
