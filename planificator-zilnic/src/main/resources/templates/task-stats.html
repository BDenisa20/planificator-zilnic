<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Statistici Task-uri</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">Statistici Task-uri</h2>

    <p><strong>Total task-uri:</strong> <span th:text="${total}"></span></p>
    <p><strong>Finalizate:</strong> <span th:text="${completed}"></span></p>
    <p><strong>Nefinalizate:</strong> <span th:text="${pending}"></span></p>

    <div class="text-center mt-4">
        <canvas id="statsChart" width="250" height="250"></canvas>
    </div>

    <a href="/tasks" class="btn btn-primary mt-4">Înapoi la task-uri</a>

</div>

<script th:inline="javascript">
    let completed = [[${completed}]];
    let pending = [[${pending}]];

    const ctx = document.getElementById('statsChart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Finalizate', 'Nefinalizate'],
            datasets: [{
                data: [completed, pending],
                backgroundColor: ['#4CAF50', '#F44336'],
                borderColor: '#ffffff',
                borderWidth: 2
            }]
        },
        options: {
            responsive: false,
            plugins: {
                legend: {
                    position: 'bottom'
                }
            }
        }
    });
</script>

</body>
</html>
