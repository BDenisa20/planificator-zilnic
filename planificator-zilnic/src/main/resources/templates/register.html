<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Înregistrare</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 400px;">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">Creează cont</h2>

        <form th:action="@{/register}" th:object="${user}" method="post">

            <div th:if="${errorMessage}" class="alert alert-danger">
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="text" th:field="*{email}" class="form-control">
                <div class="text-danger" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" th:field="*{username}" class="form-control">
                <div class="text-danger" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Parolă</label>
                <input type="password" th:field="*{password}" class="form-control">
                <div class="text-danger" th:errors="*{password}"></div>
            </div>

            <button class="btn btn-success w-100">Înregistrează-te</button>
        </form>

        <a href="/login" class="btn btn-secondary mt-3 w-100">Ai deja cont?</a>

    </div>
</div>

</body>
</html>
